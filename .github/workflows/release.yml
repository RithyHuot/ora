name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write   # required for cosign keyless signing (sigstore Fulcio OIDC)

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Unit tests (race + vet)
        run: |
          go vet ./...
          go test -race ./...
      - name: Integration tests (darwin && integration)
        run: go test -race -tags=integration ./...

  release:
    needs: [test]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      # syft generates the per-archive SBOMs declared in `.goreleaser.yml`
      # (`sboms:` block). Without it goreleaser fails with
      # `exec: "syft": executable file not found in $PATH`.
      - uses: anchore/sbom-action/download-syft@v0
      # cosign performs the keyless signing of `checksums.txt` declared in
      # `.goreleaser.yml` (`signs:` block) using the workflow's OIDC token.
      - uses: sigstore/cosign-installer@v3
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
