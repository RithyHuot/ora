name: Feature request
description: Suggest an idea or enhancement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: What problem are you trying to solve?
      description: A clear description of the use case.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the solution you'd like
      description: What should happen?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe alternatives you've considered
      description: Any workarounds or other approaches.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Additional context
      description: Anything else that might help.
